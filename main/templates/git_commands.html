<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Commands</title>
</head>

<body>
    <a href="{% url 'index' %}">Home</a>
    <a href="{% url 'postgres_commands' %}">Postgres Commands</a>
    <a href="{% url 'django_commands' %}">Django Commands</a>
    <a href="{% url 'git_commands' %}"> Git Commands</a>
    
    <h1> Common git commands</h1>

    <table border="1">
        <thead>
            <tr>
                <th>Command</th>
                <th>Description</th>
                
            </tr>
        </thead>
        <tbody>
            {% for item in commands %}
            <tr>
                <td><code>{{ item.command }}</code></td>
                <td>{{ item.description }}</td>
               
            </tr>
            {% empty %}
            <tr>
                <td colspan="2">No commands found in the database yet!</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
